name: deploy-aws-frontend

# push to production -> typecheck/test -> vite build -> S3 sync -> CloudFront
# invalidation. Replaces the Vercel flow; the same-origin /api/* rewrite now
# lives in CloudFront (see infra/cloudfront.tf), so VITE_API_BASE_URL stays "".
#
# Repo configuration (Settings -> Secrets and variables -> Actions -> Variables),
# values come from `terraform output`:
#   AWS_REGION                  e.g. ap-south-1
#   AWS_ROLE_ARN                ci_fe_role_arn
#   FRONTEND_BUCKET             frontend_bucket
#   CLOUDFRONT_DISTRIBUTION_ID  cloudfront_distribution_id

on:
  push:
    branches: [production]
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC federation to AWS
  contents: read

concurrency:
  group: deploy-aws-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Empty on purpose: the app calls /api/* on its OWN origin and CloudFront
      # routes those to the ALB. Same-origin => cookies stay first-party.
      VITE_API_BASE_URL: ""
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Optional gate — remove these two if your suite isn't deploy-blocking.
      - run: bun run test
      - run: bunx tsc -b --noEmit

      - name: Build
        run: bun run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Hashed assets: immutable, cache for a year.
          aws s3 sync dist/ "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete \
            --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          # index.html: never cached, so deploys are instant.
          aws s3 cp dist/index.html "s3://${{ vars.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/"
