name: deploy-frontend

# push to main -> typecheck/test -> vercel build -> vercel deploy --prod
# Vercel's own Git auto-deploy is left OFF; this workflow is the single driver.

on:
  push:
    branches: [production]
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      # Empty on purpose: the app calls /api/* on its OWN origin and vercel.json
      # rewrites those to Render. Same-origin => cookies stay first-party.
      VITE_API_BASE_URL: ""
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Optional gate — remove these two if your suite isn't deploy-blocking.
      - run: bun run test
      - run: bunx tsc -b --noEmit

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
